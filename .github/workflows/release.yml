name: release

# Directive 6 §task 5 — release binaries `dexdo` for five target triples. On a `v*` tag, BOTH binary
# variants are built and attached to the GitHub Release:
#   • default (mock)       — `dexdo-<target>.{tar.gz|zip}`         (no C dependencies, cross-platform);
#   • `--features shellnet` — `dexdo-shellnet-<target>.{tar.gz|zip}` (real testnet, TVM SDK v3).
# `workflow_dispatch` builds the same artifacts without a release. protoc is vendored (build.rs) and runs on
# the HOST, so cross-compilation (e.g. aarch64-linux) does not require a target-protoc.
#
# Fault tolerance: the default variant is must-have (its failure fails the job). The shellnet variant is best-effort
# (`continue-on-error` on build/packaging/upload of each triple): one failed shellnet target does NOT fail the
# release, the default binaries always make it into the release. Per PLATFORMS.md shellnet is verified on Linux/macOS;
# Windows is fixed upstream (`tvm-sdk#270`), but there was no Windows machine verification → marked best-effort.

# MIGRATION (2026-06-25): the release build moved to Woodpecker CI (`.woodpecker/release.yml`) — Linux+docker
# runners, cross-compilation of all 5 triples, upload to GitHub Release. Reason: GitHub Actions in this
# account is blocked over billing (per the job annotations — "recent account payments have failed", NOT
# minutes exhaustion). This workflow is KEPT as a manual fallback: the auto-trigger on the `v*` tag is REMOVED, so a tag
# does not spawn red failed-payment runs in parallel with Woodpecker. It runs only manually
# (`workflow_dispatch`), if Actions get re-enabled.
on:
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: github.repository == 'gosh-sh/dexdo-cli-private'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     target: x86_64-unknown-linux-musl }
          - { os: ubuntu-24.04-arm,  target: aarch64-unknown-linux-musl }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install Linux musl build dependencies
        if: contains(matrix.target, 'unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools clang cmake nasm perl binutils

      # ───────────────────────── default (mock) — must-have ─────────────────────────
      - name: Build release (default / mock features)
        run: cargo build --release --locked --bin dexdo --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ contains(matrix.target, 'unknown-linux-musl') && '-C target-feature=+crt-static' || '' }}
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
      - name: Linux portability smoke (old distros + no GLIBC symbols)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail
          bin="$PWD/target/${{ matrix.target }}/release/dexdo"
          for image in ubuntu:22.04 debian:12; do
            echo "== smoke $image =="
            docker run --rm -v "$bin:/usr/local/bin/dexdo:ro" "$image" sh -lc 'dexdo --version >/dev/null && dexdo --help >/dev/null'
          done
          ldd "$bin" > ldd.txt 2>&1 || true
          cat ldd.txt
          if grep -q 'GLIBC_' ldd.txt; then
            echo "dexdo linux release artifact must not require GLIBC_* symbols" >&2
            exit 1
          fi
          if readelf -V "$bin" 2>/dev/null | grep -q 'GLIBC_'; then
            echo "readelf found GLIBC_* version symbols" >&2
            exit 1
          fi
          if objdump -T "$bin" 2>/dev/null | grep -q 'GLIBC_'; then
            echo "objdump found GLIBC_* dynamic symbols" >&2
            exit 1
          fi
      - name: Package (default)
        shell: bash
        run: |
          staging="dexdo-${{ matrix.target }}"
          mkdir -p "$staging"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/dexdo.exe" "$staging/"
          else
            cp "target/${{ matrix.target }}/release/dexdo" "$staging/"
          fi
          cp PLATFORMS.md "$staging/" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${staging}.zip" "$staging" >/dev/null
            echo "ASSET=${staging}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${staging}.tar.gz" "$staging"
            echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Upload build artifact (default)
        uses: actions/upload-artifact@v4
        with:
          name: dexdo-${{ matrix.target }}
          path: ${{ env.ASSET }}
      - name: Attach to GitHub Release (default, on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

      # ─────────────────────── shellnet (real testnet) — best-effort ───────────────────────
      # Failure of any step of this variant does NOT fail the job: the default is already attached above.
      - name: Build release (shellnet feature)
        id: shellnet_build
        continue-on-error: true
        run: cargo build --release --locked --features shellnet --bin dexdo --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ contains(matrix.target, 'unknown-linux-musl') && '-C target-feature=+crt-static' || '' }}
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
      - name: Package (shellnet)
        id: shellnet_pkg
        if: steps.shellnet_build.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          staging="dexdo-shellnet-${{ matrix.target }}"
          mkdir -p "$staging"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/dexdo.exe" "$staging/"
          else
            cp "target/${{ matrix.target }}/release/dexdo" "$staging/"
          fi
          # The binary reads the manifest of deployed contracts at runtime — place it alongside.
          cp contracts/deployed.shellnet.json "$staging/"
          cp PLATFORMS.md "$staging/" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${staging}.zip" "$staging" >/dev/null
            echo "SHELLNET_ASSET=${staging}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${staging}.tar.gz" "$staging"
            echo "SHELLNET_ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Upload build artifact (shellnet)
        if: steps.shellnet_pkg.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dexdo-shellnet-${{ matrix.target }}
          path: ${{ env.SHELLNET_ASSET }}
      - name: Attach to GitHub Release (shellnet, on tag)
        if: steps.shellnet_pkg.outcome == 'success' && startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SHELLNET_ASSET }}

  # Checksums over ALL built assets (both variants × all successful triples).
  checksums:
    name: SHA256SUMS
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'gosh-sh/dexdo-cli-private'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist
          # Asset names are unambiguous (variant + triple + extension); checksum all archives.
          sha256sum dexdo-*.tar.gz dexdo-*.zip 2>/dev/null > SHA256SUMS || true
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS
      - name: Upload SHA256SUMS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS
      - name: Attach SHA256SUMS to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SHA256SUMS
