name: ci

# Directive 6 — cross-platform delivery. The default (mock) build MUST be green
# on Linux/macOS/Windows. The `shellnet` feature (TVM SDK v3) — best-effort, checked separately
# and not yet part of the mandatory matrix.

# ⚠ Trigger policy (D6, 2026-06-25): the heavy matrix runs ONLY on a release tag `v*` from main —
# where artifact validation is actually needed. NO auto-runs on push/PR to `dev`: earlier this burned
# the monthly Actions limit ("job not started"). The dev cycle is checked LOCALLY with `./ci-local.sh`
# (cargo test --workspace / fmt / clippy) — the only gate on dev. `workflow_dispatch` — a manual run.
# Actions is enabled by the lead for a release (billing); until then there are no starts by construction (only by tag/manually).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # English-only source gate: no Cyrillic may reach a release (comments, identifiers,
  # string literals). Cheap (no toolchain) — runs the same script as ./ci-local.sh.
  no-cyrillic:
    name: no-cyrillic (English-only source)
    runs-on: ubuntu-latest
    if: github.repository == 'gosh-sh/dexdo-cli-private'
    steps:
      - uses: actions/checkout@v4
      - name: Source must be English-only (no Cyrillic)
        run: bash ci/check-no-cyrillic.sh

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.repository == 'gosh-sh/dexdo-cli-private'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # protoc is vendored in dexdo-proto/build.rs (D6) — a system protoc is not needed on any OS.
      # The Windows default is FIXED upstream (tvm-sdk#270, pin v3.0.3-rc.an, tree without ':'); the fork is removed,
      # `[patch]` is dropped — the cross-OS matrix builds on clean upstream (see PLATFORMS.md / 06-report).
      - name: Build (default / mock features)
        run: cargo build --workspace --locked
      - name: Test (default / mock features)
        run: cargo test --workspace --locked
      - name: Smoke — dexdo --help works
        run: cargo run --quiet --locked --bin dexdo -- --help

  # Best-effort: we try to build the `shellnet` feature (TVM SDK v3) on all three OSes. It does NOT block
  # (continue-on-error) — this is the "attempt to build on macOS/Windows" from D6 §task 4: the real
  # Mac/Win status is visible in this job, it does not fail the must-have (default/mock) matrix. Linux —
  # the working path (D2: 7 live shellnet tests).
  shellnet-build:
    name: shellnet build (${{ matrix.os }}, best-effort)
    runs-on: ${{ matrix.os }}
    if: github.repository == 'gosh-sh/dexdo-cli-private'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build dexdo-core --features shellnet (TVM SDK v3; native zstd/secp256k1 + ring asm)
        run: cargo build -p dexdo-core --features shellnet --locked
      # #137 Gate 2: dexdo's shellnet graph must keep ONE Acki Nacki SDK (no dodex-sdk/ackinacki-kit second SDK).
      - name: Single Acki Nacki SDK invariant (#137 Gate 2)
        run: bash ci/check-single-sdk.sh
