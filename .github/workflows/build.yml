name: build

# Builds the dexdo release binaries on native runners for every supported
# platform and attaches them to the GitHub Release for the pushed tag.
#
# Public repository only: GitHub-hosted runners are free for public repositories
# within the monthly limits, and native macOS / Windows runners produce native
# binaries (no cross-compilation).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'build-${{ github.ref }}'
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Final safety gate: the published tree must carry no authorship markers.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No AI-authorship markers in the published tree
        run: |
          # The character classes keep the literal marker words out of this file
          # while still matching them at run time.
          pat='c[l]aude|c[o]dex|g[e]mini|copil[o]t|co-?authored-by|generated (by|with) (c[l]aude|c[o]dex)'
          if grep -rniE "$pat" \
               --include='*.rs' --include='*.toml' --include='*.md' --include='*.sol' . ; then
            echo "authorship markers found in the published tree" >&2
            exit 1
          fi
          echo "clean"

  build:
    needs: guard
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # native_run marks legs whose built binary can execute on the runner
        # (binary arch/os == runner arch/os), so the post-build binary smoke
        # test can actually run it. Every target below is built on a runner of
        # its own architecture (no cross-compilation), so all are natively
        # runnable. If a cross-compiled leg is ever added (a binary whose
        # arch/os differs from the runner, e.g. building x86_64-apple-darwin on
        # an arm64 mac runner), set native_run: false so the smoke step is
        # skipped instead of trying to execute a foreign-arch binary.
        include:
          - { target: x86_64-unknown-linux-gnu,   os: ubuntu-latest,     ext: tar.gz, native_run: true }
          - { target: aarch64-unknown-linux-gnu,  os: ubuntu-24.04-arm,  ext: tar.gz, native_run: true }
          - { target: x86_64-apple-darwin,        os: macos-15-intel,    ext: tar.gz, native_run: true }
          - { target: aarch64-apple-darwin,       os: macos-latest,      ext: tar.gz, native_run: true }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest,    ext: zip,    native_run: true }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # The production binary is built WITHOUT the test faucet: `shellnet` only.
      - name: Build
        run: cargo build --release --locked -p dexdo --features shellnet --target ${{ matrix.target }}

      # Smoke-test the freshly built release binary by executing it. Runs only
      # when the binary is natively runnable on this runner (native_run); a
      # cross-compiled binary for another arch/os cannot execute here and is
      # skipped. `dexdo` has no --version flag (clap derive, no version
      # attribute -> --version errors), so --help is the execute-proof: it
      # fails the leg if the binary cannot start (bad arch, missing loader,
      # link error, or a panic during startup) before we package or ship it.
      - name: Smoke test binary (unix)
        if: matrix.native_run && matrix.os != 'windows-latest'
        shell: bash
        run: |
          "target/${{ matrix.target }}/release/dexdo" --help

      - name: Smoke test binary (windows)
        if: matrix.native_run && matrix.os == 'windows-latest'
        shell: bash
        run: |
          "target/${{ matrix.target }}/release/dexdo.exe" --help

      # Package the binary together with the runtime configuration it reads
      # (model config + deployed contract pins) and the docs.
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          OS="$(echo '${{ matrix.target }}' | sed -E 's/.*(linux|darwin).*/\1/; s/darwin/macos/')"
          ARCH="$(echo '${{ matrix.target }}' | cut -d- -f1)"
          NAME="dexdo-${VER}-${ARCH}-${OS}"
          mkdir -p "stage/${NAME}"
          cp "target/${{ matrix.target }}/release/dexdo" "stage/${NAME}/"
          mkdir -p "stage/${NAME}/contracts"
          cp contracts/deployed.shellnet.json "stage/${NAME}/contracts/"
          cp models.json README.md LICENSE "stage/${NAME}/"
          tar -C stage -czf "${NAME}.tar.gz" "${NAME}"
          hash="$(shasum -a 256 "${NAME}.tar.gz" | awk '{print $1}')"
          sh ci/write-sha256-line.sh "$hash" "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          NAME="dexdo-${VER}-x86_64-windows"
          mkdir -p "stage/${NAME}/contracts"
          cp "target/${{ matrix.target }}/release/dexdo.exe" "stage/${NAME}/"
          cp contracts/deployed.shellnet.json "stage/${NAME}/contracts/"
          cp models.json README.md LICENSE "stage/${NAME}/"
          (cd stage && 7z a -tzip "../${NAME}.zip" "${NAME}" >/dev/null)
          hash="$(certutil -hashfile "${NAME}.zip" SHA256 | sed -n 2p | tr -d '[:space:]')"
          sh ci/write-sha256-line.sh "$hash" "${NAME}.zip" > "${NAME}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: dexdo-${{ matrix.target }}
          path: |
            dexdo-*.tar.gz
            dexdo-*.zip
            dexdo-*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # One combined checksum file over every archive.
      - name: Combine checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS || true
          cp ../install.sh ../install.ps1 . 2>/dev/null || true
          ls -la

      # Release notes: the top section of CHANGELOG.md (generated at publish time).
      - name: Extract release notes
        run: |
          awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md > NOTES.md 2>/dev/null || echo "dexdo ${GITHUB_REF_NAME}" > NOTES.md
          cat NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: NOTES.md
          files: |
            dist/dexdo-*.tar.gz
            dist/dexdo-*.zip
            dist/SHA256SUMS
            dist/install.sh
            dist/install.ps1

  # Smoke-test the real install path an end user takes: fetch and run the
  # PUBLISHED install script, which resolves the latest release, downloads this
  # platform's archive, verifies its SHA256 against the published SHA256SUMS,
  # unpacks it, and puts `dexdo` on PATH -- then runs the binary. This validates
  # the release archive naming, the checksum file, and PATH placement end to end
  # against the release this run just published, so a broken install script, a
  # misnamed archive, a bad checksum, or a non-runnable binary fails the release.
  #
  # Runs only for real tag builds (a published release exists) and after the
  # `release` job. Scope: a guard step first asserts the API `latest` == the tag
  # this run published, then it installs via the published scripts, so it always
  # tests THIS release. macOS is not re-tested here because the per-build binary
  # smoke test already runs the two macOS binaries natively on their runners;
  # this job covers the two scripted installers (sh + PowerShell) on clean
  # linux and windows runners.
  install-smoke:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Prove this job smoke-tests THIS release, not a stale or newer one: the
      # API `latest` must resolve to the tag that triggered this run before we
      # install (the published install scripts resolve `latest`). Retry to absorb
      # release propagation, then fail closed.
      - name: Assert latest release == this tag
        shell: bash
        run: |
          n=0
          until [ "$(curl -fsSL https://api.github.com/repos/gosh-sh/dexdo-cli/releases/latest | grep -oE '"tag_name": *"[^"]*"' | head -1 | sed -E 's/.*"([^"]*)"$/\1/')" = "${GITHUB_REF_NAME}" ]; do
            n=$((n + 1))
            if [ "$n" -ge 12 ]; then echo "latest is not ${GITHUB_REF_NAME} after retries; refusing to smoke-test a different release" >&2; exit 1; fi
            echo "latest not yet ${GITHUB_REF_NAME}, retrying ($n) ..."; sleep 10
          done
          echo "latest == ${GITHUB_REF_NAME}; proceeding"
      - name: Install from the published script and run (linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # The documented user command, wrapped in a short retry to absorb
          # release/asset propagation delay before failing closed.
          install_once() {
            curl -fsSL https://github.com/gosh-sh/dexdo-cli/releases/latest/download/install.sh -o install.sh \
              && sh install.sh
          }
          n=0
          until install_once; do
            n=$((n + 1))
            if [ "$n" -ge 12 ]; then echo "install did not succeed" >&2; exit 1; fi
            echo "install not ready yet, retrying ($n) ..."; sleep 10
          done
          # The linux script installs into ~/.local/bin; put it on PATH and run.
          export PATH="$HOME/.local/bin:$PATH"
          command -v dexdo
          dexdo --help

      - name: Install from the published script and run (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # The documented `irm ... | iex` install, with the same short retry.
          $ok = $false
          for ($n = 1; $n -le 12; $n++) {
            try {
              $script = Invoke-RestMethod 'https://github.com/gosh-sh/dexdo-cli/releases/latest/download/install.ps1'
              Invoke-Expression $script
              $ok = $true
              break
            } catch {
              Write-Host "install not ready yet, retrying ($n) ..."
              Start-Sleep -Seconds 10
            }
          }
          if (-not $ok) { throw 'install did not succeed' }
          # The script copies dexdo.exe into %LOCALAPPDATA%\dexdo\bin and adds
          # that dir to the persistent User PATH (not visible to this process).
          # Verify both: the User PATH entry was written, and the binary runs.
          $binDir = Join-Path $env:LOCALAPPDATA 'dexdo\bin'
          $userPath = [Environment]::GetEnvironmentVariable('Path', 'User')
          if ($userPath -notlike "*$binDir*") { throw "dexdo bin dir not added to User PATH" }
          $env:Path = "$binDir;$env:Path"
          if (-not (Get-Command dexdo -ErrorAction SilentlyContinue)) { throw 'dexdo not found on PATH' }
          dexdo --help
          if ($LASTEXITCODE -ne 0) { throw 'dexdo --help failed' }
